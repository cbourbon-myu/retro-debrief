  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBPH2KoTL5kYXT5c7obYidciDuElmr2C7Y",
      authDomain: "backstage-debrief.firebaseapp.com",
      databaseURL: "https://backstage-debrief-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "backstage-debrief",
      storageBucket: "backstage-debrief.firebasestorage.app",
      messagingSenderId: "313402258283",
      appId: "1:313402258283:web:5f6ce5828effa0a519d22e"
    };
    let db = null;
    let auth = null;
    try { firebase.initializeApp(firebaseConfig); db = firebase.database(); auth = firebase.auth(); }
    catch(e) { console.warn("Firebase init error:", e); }

    // Registre global des templates (rempli par les fichiers templates/*.js)
    window.RETRO_TEMPLATES = window.RETRO_TEMPLATES || {};

    // Liste des admins chargée dynamiquement depuis Firebase APRÈS authentification
    window.ADMIN_EMAILS = [];
    if (db && auth) {
      let adminListener = null;
      auth.onAuthStateChanged((user) => {
        if (user) {
          // Utilisateur connecté → on écoute la liste des admins
          adminListener = db.ref("config/adminEmails").on("value", (snap) => {
            window.ADMIN_EMAILS = snap.val() || [];
            window.dispatchEvent(new Event("admins-updated"));
          });
        } else {
          // Déconnecté → on coupe le listener et on vide la liste
          if (adminListener) db.ref("config/adminEmails").off("value", adminListener);
          window.ADMIN_EMAILS = [];
          window.dispatchEvent(new Event("admins-updated"));
        }
      });
    }

    // Charge les templates custom depuis Firebase au démarrage
    if (db) {
      db.ref("customTemplates").on("value", (snap) => {
        const customs = snap.val();
        if (customs) {
          Object.entries(customs).forEach(([id, tpl]) => {
            window.RETRO_TEMPLATES[id] = { ...tpl, _custom: true };
          });
        }
        // Nettoyage : retirer les custom supprimés
        Object.keys(window.RETRO_TEMPLATES).forEach(id => {
          if (window.RETRO_TEMPLATES[id]._custom && (!customs || !customs[id])) {
            delete window.RETRO_TEMPLATES[id];
          }
        });
        // Dispatch event pour que React re-render
        window.dispatchEvent(new Event("templates-updated"));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // --- Récupère la liste des templates chargés ---
    function getTemplates() { return window.RETRO_TEMPLATES || {}; }
    function getTemplateList() { return Object.values(getTemplates()); }
    function getTemplate(id) { return getTemplates()[id] || getTemplateList()[0] || null; }

    // --- Composant React pour les icônes de vote (gère les erreurs sans corrompre le DOM) ---
    function VoteImg({src, emoji, style}) {
      const [err, setErr] = React.useState(false);
      React.useEffect(() => { setErr(false); }, [src]);
      if (!src || err) return <>{emoji}</>;
      return <img src={src} style={style} onError={() => setErr(true)} />;
    }

    // --- Composant React pour les logos/icônes (gère les erreurs sans corrompre le DOM) ---
    function LogoImg({src, emoji, size, circle, onZoom}) {
      const [err, setErr] = React.useState(false);
      React.useEffect(() => { setErr(false); }, [src]);
      if (!src || err) return <span style={{fontSize: Math.round(size*0.75), lineHeight:"1"}}>{emoji}</span>;
      return <div onClick={() => onZoom && onZoom(src)} style={{width:size,height:size,borderRadius:circle!==false?"50%":8,overflow:"hidden",flexShrink:0,cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center"}}><img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={() => setErr(true)}/></div>;
    }

    // --- Hook pour forcer un re-render quand les templates custom changent ---
    function useTemplateRefresh() {
      const [, setTick] = useState(0);
      useEffect(() => {
        const handler = () => setTick(t => t + 1);
        window.addEventListener("templates-updated", handler);
        return () => window.removeEventListener("templates-updated", handler);
      }, []);
    }

    // --- RESPONSIVE HOOK ---
    function useResponsive() {
      const [width, setWidth] = useState(window.innerWidth);
      useEffect(() => {
        const handle = () => setWidth(window.innerWidth);
        window.addEventListener("resize", handle);
        return () => window.removeEventListener("resize", handle);
      }, []);
      return { isMobile: width <= 768, isTablet: width > 768 && width <= 1024, isDesktop: width > 1024, width };
    }

    // --- AUTH HOOK ---
    function useAuth() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      useEffect(() => {
        if (!auth) { setLoading(false); return; }
        return auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
      }, []);
      const signIn = async () => {
        setError(null);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ hd: "myunisoft.fr" });
          await auth.signInWithPopup(provider);
        } catch (e) { setError(e.message); }
      };
      const signOut = async () => { await auth.signOut(); };
      return { user, loading, error, signIn, signOut };
    }

    // --- FIREBASE DB HOOK ---
    function useFirebase(path, defaultVal, enabled) {
      const [data, setData] = useState(defaultVal);
      const [status, setStatus] = useState("connecting");
      useEffect(() => {
        if (!enabled || !db) { setStatus("offline"); return; }
        const ref = db.ref(path);
        const handler = ref.on("value", (snap) => {
          const val = snap.val();
          setData(val ? Object.values(val) : []);
          setStatus("synced");
        }, (err) => { setStatus("error"); console.error(err); });
        return () => ref.off("value", handler);
      }, [path, enabled]);
      const setItems = useCallback(async (newData) => { if (!db) return; setStatus("saving"); const obj = {}; newData.forEach((item) => { obj[item.id] = item; }); await db.ref(path).set(obj); setStatus("synced"); }, [path]);
      const pushItem = useCallback(async (item) => { if (!db) return; setStatus("saving"); await db.ref(path + "/" + item.id).set(item); setStatus("synced"); }, [path]);
      const removeItem = useCallback(async (id) => { if (!db) return; setStatus("saving"); await db.ref(path + "/" + id).remove(); setStatus("synced"); }, [path]);
      const updateItem = useCallback(async (id, updates) => { if (!db) return; setStatus("saving"); await db.ref(path + "/" + id).update(updates); setStatus("synced"); }, [path]);
      return { data, status, setItems, pushItem, removeItem, updateItem };
    }

    // --- RIDEAU CONCERT ---
    function ConcertCurtain({ visible, catLabel }) {
      if (!visible) return null;
      const folds = Array.from({ length: 8 });
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 9999, pointerEvents: "none", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, width: "50%", height: "100%", animation: "curtainLeft 2.4s cubic-bezier(0.4,0,0.2,1) forwards", display: "flex" }}>
            {folds.map((_, i) => (<div key={i} style={{ flex: 1, height: "100%", background: `linear-gradient(180deg, #6B0000 0%, #CC0000 ${20+i*8}%, #8B0000 ${50+i*4}%, #DC143C 100%)`, boxShadow: i%2===0?"inset -6px 0 12px rgba(0,0,0,0.4)":"inset 6px 0 12px rgba(255,255,255,0.1)", borderRight: "1px solid rgba(0,0,0,0.2)" }} />))}
            <div style={{ position: "absolute", right: -2, top: 0, width: 18, height: "100%", background: "repeating-linear-gradient(180deg, #FFD700 0px, #B8860B 8px, #FFD700 16px)", opacity: 0.9 }} />
          </div>
          <div style={{ position: "absolute", top: 0, right: 0, width: "50%", height: "100%", animation: "curtainRight 2.4s cubic-bezier(0.4,0,0.2,1) forwards", display: "flex", flexDirection: "row-reverse" }}>
            {folds.map((_, i) => (<div key={i} style={{ flex: 1, height: "100%", background: `linear-gradient(180deg, #6B0000 0%, #CC0000 ${20+i*8}%, #8B0000 ${50+i*4}%, #DC143C 100%)`, boxShadow: i%2===0?"inset 6px 0 12px rgba(0,0,0,0.4)":"inset -6px 0 12px rgba(255,255,255,0.1)", borderLeft: "1px solid rgba(0,0,0,0.2)" }} />))}
            <div style={{ position: "absolute", left: -2, top: 0, width: 18, height: "100%", background: "repeating-linear-gradient(180deg, #FFD700 0px, #B8860B 8px, #FFD700 16px)", opacity: 0.9 }} />
          </div>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, animation: "curtainText 2.4s ease forwards" }}>
            <div style={{ fontSize: 64 }}>🤔</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#FFD700", textShadow: "0 2px 8px rgba(0,0,0,0.6)", textAlign: "center", padding: "0 20px" }}>Résultats {catLabel}</div>
            <div style={{ fontSize: 14, color: "#FDE047", opacity: 0.8 }}>Tout le monde a voté !</div>
          </div>
        </div>
      );
    }

    // --- ADMINS (chargés dynamiquement depuis Firebase) ---
    function useAdminEmails() {
      const [admins, setAdmins] = useState(window.ADMIN_EMAILS || []);
      useEffect(() => {
        const handler = () => setAdmins([...(window.ADMIN_EMAILS || [])]);
        window.addEventListener("admins-updated", handler);
        return () => window.removeEventListener("admins-updated", handler);
      }, []);
      return admins;
    }

    // --- TIMER DEFAULTS ---
    const TIMER_PHASES = {
      votes: { label: "Vibe Check", emoji: "🎤", defaultSeconds: 300 },
      retours: { label: "Retours", emoji: "💬", defaultSeconds: 600 },
      roti: { label: "ROTI", emoji: "📊", defaultSeconds: 180 },
    };

    // --- TIMER SOUND (Web Audio API) ---
    function playTimerEndSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
          gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.8);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.8);
        });
        // Final gong
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.type = "triangle";
        osc2.frequency.setValueAtTime(261.63, ctx.currentTime + 0.6);
        gain2.gain.setValueAtTime(0.4, ctx.currentTime + 0.6);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2.5);
        osc2.start(ctx.currentTime + 0.6);
        osc2.stop(ctx.currentTime + 2.5);
      } catch(e) { console.warn("Audio error:", e); }
    }

    // --- TIMER HOOK (synced via Firebase) ---
    function useTimer(retroKey, enabled) {
      const [timerState, setTimerState] = useState(null); // { phase, endTime, pausedRemaining, status }
      const [remaining, setRemaining] = useState(null);
      const [flash, setFlash] = useState(false);
      const endedRef = useRef(new Set());

      useEffect(() => {
        if (!enabled || !db || !retroKey) return;
        const ref = db.ref(`retro-${retroKey}/timer`);
        const handler = ref.on("value", (snap) => {
          setTimerState(snap.val() || null);
        });
        return () => ref.off("value", handler);
      }, [retroKey, enabled]);

      // Countdown tick
      useEffect(() => {
        if (!timerState || timerState.status !== "running") {
          if (timerState?.status === "paused") setRemaining(Math.ceil((timerState.pausedRemaining || 0) / 1000));
          else if (timerState?.status === "ended") setRemaining(0);
          else setRemaining(null);
          return;
        }
        const tick = () => {
          const left = Math.max(0, Math.ceil((timerState.endTime - Date.now()) / 1000));
          setRemaining(left);
          if (left <= 0 && !endedRef.current.has(timerState.phase + timerState.endTime)) {
            endedRef.current.add(timerState.phase + timerState.endTime);
            playTimerEndSound();
            setFlash(true);
            setTimeout(() => setFlash(false), 2000);
            if (db && retroKey) db.ref(`retro-${retroKey}/timer/status`).set("ended");
          }
        };
        tick();
        const interval = setInterval(tick, 250);
        return () => clearInterval(interval);
      }, [timerState]);

      const startTimer = (phase, seconds) => {
        if (!db || !retroKey) return;
        endedRef.current.delete(phase);
        db.ref(`retro-${retroKey}/timer`).set({
          phase, status: "running", endTime: Date.now() + seconds * 1000,
          pausedRemaining: null, duration: seconds,
        });
      };
      const pauseTimer = () => {
        if (!db || !retroKey || !timerState || timerState.status !== "running") return;
        const left = Math.max(0, timerState.endTime - Date.now());
        db.ref(`retro-${retroKey}/timer`).update({ status: "paused", pausedRemaining: left });
      };
      const resumeTimer = () => {
        if (!db || !retroKey || !timerState || timerState.status !== "paused") return;
        db.ref(`retro-${retroKey}/timer`).update({ status: "running", endTime: Date.now() + (timerState.pausedRemaining || 0), pausedRemaining: null });
      };
      const stopTimer = () => {
        if (!db || !retroKey) return;
        db.ref(`retro-${retroKey}/timer`).set(null);
      };

      const activePhase = timerState?.phase || null;
      const isRunning = timerState?.status === "running";
      const isPaused = timerState?.status === "paused";
      const isEnded = timerState?.status === "ended";

      return { remaining, activePhase, isRunning, isPaused, isEnded, flash, startTimer, pauseTimer, resumeTimer, stopTimer, timerState };
    }

    // --- FORMAT TIMER ---
    function formatTimer(seconds) {
      if (seconds == null) return "--:--";
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    // --- TIMER ADMIN CONTROL (inline, for each phase) ---
    function TimerAdminControl({ phase, timer, isMobile, T }) {
      const [editSeconds, setEditSeconds] = useState(TIMER_PHASES[phase].defaultSeconds);
      const [showSetup, setShowSetup] = useState(false);
      const isActive = timer.activePhase === phase;
      const phaseInfo = TIMER_PHASES[phase];

      if (timer.isEnded && isActive) {
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", padding: "8px 0" }}>
            <span style={{ fontSize: 13, color: "#EF4444", fontWeight: 700 }}>⏰ Temps écoulé !</span>
            <button onClick={timer.stopTimer} style={{ padding: "4px 12px", borderRadius: 8, border: "1.5px solid #EF4444", background: "none", color: "#EF4444", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>✕ Fermer</button>
          </div>
        );
      }

      if (isActive && (timer.isRunning || timer.isPaused)) {
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", padding: "8px 0" }}>
            <span style={{ fontSize: 22, fontWeight: 900, fontFamily: "monospace", color: timer.remaining <= 30 ? "#EF4444" : (T?.accent || "#F97316"), animation: timer.remaining <= 10 ? "pulse 0.5s infinite" : "none" }}>{formatTimer(timer.remaining)}</span>
            {timer.isPaused && <button onClick={timer.resumeTimer} style={{ padding: "4px 12px", borderRadius: 8, border: "none", background: "#10B981", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>▶ Reprendre</button>}
            {timer.isRunning && <button onClick={timer.pauseTimer} style={{ padding: "4px 12px", borderRadius: 8, border: "none", background: "#F59E0B", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>⏸ Pause</button>}
            <button onClick={timer.stopTimer} style={{ padding: "4px 12px", borderRadius: 8, border: "1.5px solid #EF4444", background: "none", color: "#EF4444", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>⏹ Stop</button>
          </div>
        );
      }

      if (timer.activePhase && !isActive) return null; // Another phase has the timer

      if (showSetup) {
        const mins = Math.floor(editSeconds / 60);
        const secs = editSeconds % 60;
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", padding: "8px 0", flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, color: T?.textSecondary || "#6B7280" }}>⏱️ Durée :</span>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <input type="number" min="0" max="60" value={mins} onChange={e => setEditSeconds(Math.max(0, parseInt(e.target.value) || 0) * 60 + secs)} style={{ width: 44, padding: "4px 6px", borderRadius: 6, border: "1px solid " + (T?.inputBorder || "#E8C9A8"), fontSize: 13, textAlign: "center", fontFamily: "inherit" }} />
              <span style={{ fontSize: 11, color: T?.textMuted || "#9CA3AF" }}>min</span>
              <input type="number" min="0" max="59" value={secs} onChange={e => setEditSeconds(mins * 60 + Math.min(59, Math.max(0, parseInt(e.target.value) || 0)))} style={{ width: 44, padding: "4px 6px", borderRadius: 6, border: "1px solid " + (T?.inputBorder || "#E8C9A8"), fontSize: 13, textAlign: "center", fontFamily: "inherit" }} />
              <span style={{ fontSize: 11, color: T?.textMuted || "#9CA3AF" }}>sec</span>
            </div>
            <button onClick={() => { timer.startTimer(phase, editSeconds); setShowSetup(false); }} style={{ padding: "5px 14px", borderRadius: 8, border: "none", background: T?.accent || "#F97316", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>▶ Go !</button>
            <button onClick={() => setShowSetup(false)} style={{ padding: "5px 10px", borderRadius: 8, border: "1px solid " + (T?.cardBorder || "#E8C9A8"), background: "none", color: T?.textMuted || "#9CA3AF", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
          </div>
        );
      }

      return (
        <div style={{ display: "flex", justifyContent: "center", padding: "6px 0" }}>
          <button onClick={() => setShowSetup(true)} style={{ padding: "5px 16px", borderRadius: 8, border: "1.5px dashed " + (T?.accent || "#F97316"), background: "none", color: T?.accent || "#F97316", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s", display: "flex", alignItems: "center", gap: 6 }}
            onMouseEnter={e => { e.currentTarget.style.background = (T?.accentLight || "#FFF7ED"); }}
            onMouseLeave={e => { e.currentTarget.style.background = "none"; }}>
            ⏱️ Lancer le chrono {phaseInfo.emoji} {phaseInfo.label}
          </button>
        </div>
      );
    }

    // --- TIMER FLOATING BAR ---
    function TimerFloatingBar({ timer, isMobile }) {
      if (!timer.activePhase) return null;
      const phaseInfo = TIMER_PHASES[timer.activePhase];
      const isUrgent = timer.remaining != null && timer.remaining <= 30;
      const isEnded = timer.isEnded;

      return (
        <div className="no-print" style={{
          position: "fixed", top: 0, left: 0, right: 0, zIndex: 9990,
          background: isEnded ? "linear-gradient(135deg, #DC2626, #B91C1C)" : isUrgent ? "linear-gradient(135deg, #F59E0B, #D97706)" : "linear-gradient(135deg, #1c0a0a, #3b0f0f)",
          padding: isMobile ? "8px 12px" : "8px 24px",
          display: "flex", alignItems: "center", justifyContent: "center", gap: isMobile ? 8 : 16,
          boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
          animation: isEnded ? "pulse 0.5s infinite" : (isUrgent ? "pulse 1s infinite" : "none"),
        }}>
          <span style={{ fontSize: isMobile ? 14 : 16 }}>{phaseInfo.emoji}</span>
          <span style={{ fontSize: isMobile ? 11 : 13, color: "#fff", fontWeight: 600 }}>{phaseInfo.label}</span>
          <span style={{ fontSize: isMobile ? 24 : 30, fontWeight: 900, fontFamily: "monospace", color: isEnded ? "#fff" : isUrgent ? "#fff" : "#F97316", letterSpacing: 2 }}>
            {isEnded ? "00:00" : formatTimer(timer.remaining)}
          </span>
          {timer.isPaused && <span style={{ fontSize: 10, background: "rgba(255,255,255,0.2)", color: "#fff", padding: "2px 8px", borderRadius: 4, fontWeight: 700 }}>PAUSE</span>}
          {isEnded && <span style={{ fontSize: isMobile ? 11 : 13, color: "#FDE047", fontWeight: 700 }}>⏰ Temps écoulé !</span>}
        </div>
      );
    }

    // --- TIMER FLASH OVERLAY ---
    function TimerFlashOverlay({ flash }) {
      if (!flash) return null;
      return (
        <div style={{

        if (!db || !date) { setExistingRetro(null); return; }
        setExistingRetro("checking");
        const ref = db.ref("retro-" + date);
        ref.once("value").then(snap => {
          const val = snap.val();
          if (val && (val.feedbacks || val.actions || val.ratings)) {
            const fbCount = val.feedbacks ? Object.keys(val.feedbacks).length : 0;
            const actCount = val.actions ? Object.keys(val.actions).length : 0;
            const ratCount = val.ratings ? Object.keys(val.ratings).length : 0;

            setExistingRetro({ fbCount, actCount, ratCount, participants: [...participants].sort() });
            // Auto-enregistre dans l'index si pas encore présent
            db.ref("config/retroHistory/" + date).set(true);

            setExistingRetro(false);

      // Charge la liste des rétros existantes

        if (!db) return;
        setShowArchive(true);

        try {
          const histSnap = await db.ref("config/retroHistory").once("value");
          const history = histSnap.val() || {};

          const list = [];
          for (const dateStr of dateKeys) {
            try {

              const fbCount = retroData.feedbacks ? Object.keys(retroData.feedbacks).length : 0;
              const actCount = retroData.actions ? Object.keys(retroData.actions).length : 0;
              const ratCount = retroData.ratings ? Object.keys(retroData.ratings).length : 0;
              const participants = new Set();
              if (retroData.feedbacks) Object.values(retroData.feedbacks).forEach(f => { if (f.author) participants.add(f.author); });
              if (retroData.ratings) Object.values(retroData.ratings).forEach(r => { if (r.author) participants.add(r.author); });
              if (fbCount || actCount || ratCount) {
                const label = new Date(dateStr + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
                list.push({ dateKey: dateStr, label, fbCount, actCount, ratCount, participants: [...participants].sort() });

          list.sort((a, b) => b.dateKey.localeCompare(a.dateKey));
          setArchiveList(list);

            {hasExisting && <div style={{ background: "#FFFBEB", border: "1.5px solid #FDE68A", borderRadius: 12, padding: isMobile ? "12px 14px" : "14px 18px", marginBottom: 20, marginTop: 10, textAlign: "left" }}>

            </button>
            {!hasExisting && <button onClick={() => onSave(date, selectedTemplate)} disabled={existingRetro === "checking"} style={{ width: "100%", padding: "14px 0", borderRadius: 12, border: "none", background: sel?.titreGradient || "linear-gradient(135deg, #1c0a0a, #3b0f0f)", color: sel?.accent || "#F97316", fontSize: 15, fontWeight: 700, cursor: existingRetro === "checking" ? "not-allowed" : "pointer", opacity: existingRetro === "checking" ? 0.6 : 1, transition: "all 0.2s", marginBottom: 16 }}>{(sel?.emojiPartager || "🚀") + " Lancer la rétro"}</button>}

            {/* --- SECTION OUVRIR UNE RÉTRO EXISTANTE --- */}
            <div style={{ borderTop: "1.5px solid " + (sel?.cardBorder || "#E8C9A8"), paddingTop: 16 }}>

                onMouseEnter={e => { e.currentTarget.style.background = sel?.cardBg || "#FFFAF5"; }}

              </button>
              {showArchive && <div style={{ marginTop: 12 }}>
                {archiveLoading && <div style={{ textAlign: "center", padding: "16px 0" }}><span style={{ animation: "pulse 1s ease-in-out infinite" }}>🔍</span> Chargement…</div>}
                {!archiveLoading && archiveList.length === 0 && <div style={{ textAlign: "center", padding: "16px 0", fontSize: 13, color: sel?.textMuted || "#9CA3AF" }}>📭 Aucune rétro trouvée</div>}
                {!archiveLoading && archiveList.length > 0 && <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 300, overflowY: "auto", overflowX: "hidden" }}>
                  {archiveList.map(r => (
                    <button key={r.dateKey} onClick={() => onConsult(r.dateKey)} style={{ width: "100%", padding: "12px 14px", borderRadius: 12, cursor: "pointer", border: "1.5px solid " + (sel?.cardBorder || "#E8C9A8"), background: sel?.cardBg || "#FFFAF5", textAlign: "left", transition: "all 0.2s" }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = "#7C3AED"; e.currentTarget.style.transform = "scale(1.01)"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = sel?.cardBorder || "#E8C9A8"; e.currentTarget.style.transform = "scale(1)"; }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: sel?.textPrimary || "#1F2937", marginBottom: 4, textTransform: "capitalize" }}>{r.label}</div>
                        <span style={{ fontSize: 9, background: "#7C3AED22", color: "#7C3AED", padding: "2px 8px", borderRadius: 4, fontWeight: 700 }}>LECTURE SEULE</span>
                      </div>
                      <div style={{ display: "flex", gap: 12, fontSize: 11, color: sel?.textMuted || "#9CA3AF" }}>

                    </button>
                  ))}
                </div>}
              </div>}
            </div>
          </div>
        </div>
      );
    }

    // ╔══════════════════════════════════════════════════════╗
    // ║                    APP PRINCIPALE                    ║
    // ╚══════════════════════════════════════════════════════╝
    function BackstageDebrief() {
      const { user, loading: authLoading, error: authError, signIn, signOut } = useAuth();
      const { isMobile, isTablet, isDesktop, width } = useResponsive();
      useTemplateRefresh();
      const ADMIN_EMAILS = useAdminEmails();
      const isAuthed = !!user;
      const userName = user?.displayName?.split(" ")[0] || "Anonyme";
      const isAdmin = ADMIN_EMAILS.includes(user?.email);

      const todayKey = new Date().toISOString().split("T")[0];
      const [sprintDateKey, setSprintDateKey] = useState(null);
      const [templateId, setTemplateId] = useState(getTemplateList()[0]?.id || "backstage");
      const [cfgLoaded, setCfgLoaded] = useState(false);

      useEffect(() => {
        if (!isAuthed || !db) { setCfgLoaded(false); setSprintDateKey(null); return; }
        setCfgLoaded(false);
        setSprintDateKey(null);
        const dateRef = db.ref("config/sprintDate");
        const tplRef = db.ref("config/templateId");
        dateRef.on("value", (snap) => { setSprintDateKey(snap.val() || null); });
        tplRef.on("value", (snap) => { setTemplateId(snap.val() || getTemplateList()[0]?.id || "backstage"); setCfgLoaded(true); });
        return () => { dateRef.off("value"); tplRef.off("value"); };
      }, [isAuthed]);

      // --- TEMPLATE ACTIF ---
      const T = getTemplate(templateId) || getTemplateList()[0];

      useEffect(() => { if (T) document.body.style.background = T.bodyBg; }, [T?.bodyBg]);

      const sprintDateLabel = sprintDateKey ? new Date(sprintDateKey + "T12:00:00").toLocaleDateString("fr-FR") : "—";
      const needsDateSetup = isAdmin && cfgLoaded && !sprintDateKey;
      const saveSprintDate = (date, tplId) => { if (db) { db.ref("config/sprintDate").set(date); db.ref("config/templateId").set(tplId || getTemplateList()[0]?.id); db.ref("config/retroHistory/" + date).set(true); } };

      const [readOnlyRetroKey, setReadOnlyRetroKey] = useState(null);
      const effectiveRetroKey = readOnlyRetroKey || sprintDateKey || todayKey;
      const readOnlyDateLabel = readOnlyRetroKey ? new Date(readOnlyRetroKey + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : "";

      const fb = useFirebase(`retro-${effectiveRetroKey}/feedbacks`, [], isAuthed && cfgLoaded);
      const act = useFirebase(`retro-${effectiveRetroKey}/actions`, [], isAuthed && cfgLoaded);
      const rat = useFirebase(`retro-${effectiveRetroKey}/ratings`, [], isAuthed && cfgLoaded);
      const feedbacks = fb.data; const actions = act.data; const ratingsRaw = rat.data;

      const getRatingsForCategory = (catId) => Array.isArray(ratingsRaw) ? ratingsRaw.filter(r => r.category === catId) : [];
      const getMyRating = (catId) => Array.isArray(ratingsRaw) ? ratingsRaw.find(r => r.category === catId && r.authorUid === user?.uid) : null;

      // --- PRÉSENCE ---
      const [connectedUsers, setConnectedUsers] = useState([]);
      useEffect(() => {
        if (!isAuthed || !db || !sprintDateKey) return;
        const presenceRef = db.ref(`retro-${sprintDateKey}/presence/${user.uid}`);
        const allRef = db.ref(`retro-${sprintDateKey}/presence`);
        const connectedRef = db.ref(".info/connected");
        const registerPresence = () => { presenceRef.set({ name: userName, uid: user.uid, lastSeen: Date.now() }); presenceRef.onDisconnect().remove(); };
        connectedRef.on("value", snap => { if (snap.val() === true) registerPresence(); });
        const heartbeat = setInterval(() => { presenceRef.update({ lastSeen: Date.now() }); }, 30000);
        allRef.on("value", snap => {
          const val = snap.val(); if (!val) { setConnectedUsers([]); return; }
          const now = Date.now(); const active = [];
          Object.entries(val).forEach(([uid, u]) => { if (u.name && u.lastSeen && (now - u.lastSeen) < 90000) { if (!active.some(a => a.uid === u.uid)) active.push(u); } else db.ref(`retro-${sprintDateKey}/presence/${uid}`).remove(); });
          setConnectedUsers(active);
        });
        const handleUnload = () => presenceRef.remove();
        window.addEventListener("beforeunload", handleUnload);
        return () => { clearInterval(heartbeat); presenceRef.remove(); allRef.off("value"); connectedRef.off("value"); window.removeEventListener("beforeunload", handleUnload); };
      }, [isAuthed, sprintDateKey, user?.uid]);

      const connectedUids = connectedUsers.map(u => u.uid);
      const everyoneVotedFor = (catId) => connectedUids.length > 0 && connectedUids.every(uid => Array.isArray(ratingsRaw) && ratingsRaw.some(r => r.category === catId && r.authorUid === uid));

      const [curtainTriggered, setCurtainTriggered] = useState({});
      const [showResults, setShowResults] = useState({});
      useEffect(() => {
        ["ambiance", "satisfaction", "roti"].forEach(catId => {
          if (everyoneVotedFor(catId) && !curtainTriggered[catId]) { setCurtainTriggered(prev => ({ ...prev, [catId]: true })); setTimeout(() => setShowResults(prev => ({ ...prev, [catId]: true })), 1600); }
        });
      }, [ratingsRaw, connectedUids.length]);

      const activeCurtain = ["ambiance","satisfaction","roti"].find(id => curtainTriggered[id] && !showResults[id]) || null;
      const submitRating = (catId, score) => { const existing = getMyRating(catId); if (existing) rat.updateItem(existing.id, { score }); else rat.pushItem({ id: Date.now(), category: catId, score, author: userName, authorUid: user.uid }); };
      const getAvg = (catId) => { const items = getRatingsForCategory(catId); if (!items.length) return null; return (items.reduce((s, r) => s + r.score, 0) / items.length).toFixed(1); };

      const [selectedCat, setSelectedCat] = useState("rock");
      const [retourText, setRetourText] = useState("");
      const [actionsDesc, setActionsDesc] = useState("");
      const [actionsResp, setActionsResp] = useState("");
      const [editingFeedback, setEditingFeedback] = useState(null);
      const [editingAction, setEditingAction] = useState(null);
      const [showPresence, setShowPresence] = useState(false);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [showIntegration, setShowIntegration] = useState(false);

                            <div style={{ display: "flex", gap: isMobile ? 10 : 16, flexWrap: "wrap", justifyContent: "center" }}>
                              {[{ label: T.ratingCatLabels.ambiance, avg: avgAmbiance, color: T.ressentiChecks[0]?.border }, { label: T.ratingCatLabels.satisfaction, avg: avgSatisfaction, color: T.ressentiChecks[1]?.border }, { label: "ROTI", avg: avgRoti, color: T.roti.border }].filter(v => v.avg).map(v => (
                                <div key={v.label} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: isMobile ? "10px 14px" : "12px 20px", textAlign: "center", border: "1px solid " + v.color + "44", minWidth: isMobile ? 90 : 110 }}>
                                  <div style={{ fontSize: 24, marginBottom: 2 }}>{voteImgOrEmoji(T.ratingLabels[Math.round(v.avg)]?.image, T.ratingLabels[Math.round(v.avg)]?.emoji, {width:24,height:24,objectFit:"cover",borderRadius:"50%"})}</div>
                                  <div style={{ fontSize: 22, fontWeight: 900, color: v.color }}>{v.avg}</div>
                                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>{v.label}</div>
                                </div>))}
                            </div>
                          </div>}
                          {pinnedFeedbacks.length > 0 && <div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Retours clés</div>
                            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr 1fr", gap: 10 }}>
                              {T.categories.map(cat => { const items = pinnedByCat[cat.id] || []; if (!items.length) return null; const col = T.columns[cat.id]; return (
                                <div key={cat.id} style={{ background: cat.bg + (isDark ? "" : "1F"), borderRadius: 10, border: "1px solid " + col.border + "44", padding: "10px 12px" }}>
                                  <div style={{ fontSize: 11, fontWeight: 700, color: col.border, marginBottom: 8 }}>{col.title}</div>
                                  <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>{items.map(f => (<div key={f.id} style={{ fontSize: 12, color: "rgba(255,255,255,0.85)", lineHeight: 1.4 }}>• {f.text}</div>))}</div>
                                </div>); })}
                            </div>
                          </div>}
                          {actions.length > 0 && <div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>{T.actionsTitle}</div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              {actions.map(a => (<div key={a.id} style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,0.06)", borderRadius: 8, padding: "8px 12px", border: "1px solid " + T.accent + "33" }}><span style={{ fontSize: 14 }}>{a.done ? "✅" : "🎯"}</span><div style={{ flex: 1, fontSize: 12.5, color: "rgba(255,255,255,0.85)", textDecoration: a.done ? "line-through" : "none", opacity: a.done ? 0.6 : 1 }}>{a.description}</div>{a.responsable && <div style={{ fontSize: 10.5, color: T.accent, fontWeight: 500 }}>{a.responsable}</div>}</div>))}
                            </div>
                          </div>}
                        </div>)}
                      </div>
                    </div>
                  </div>);
              })();

              {/* ---- FIN ---- */}
              if (sectionId === "fin") return (() => {
                const a1 = getAvg("ambiance"), a2 = getAvg("satisfaction"), a3 = getAvg("roti");
                const vals = [a1, a2, a3].filter(v => v !== null).map(Number);
                const globalAvg = vals.length === 3 ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
                const finKey = globalAvg === null ? "none" : globalAvg > 4 ? "high" : globalAvg >= 3 ? "mid" : "low";
                const msgData = T.fin[finKey];
                const gifUrl = T.finGifs ? T.finGifs[finKey] : null;
                return (
                  <div key={"fin-" + templateId} style={{ borderRadius: 16, position: "relative", overflow: "hidden", marginBottom: 16, border: T.finBorderWidth > 0 ? `${T.finBorderWidth}px solid ${T.finBorderColor||"transparent"}` : "none", minHeight: isMobile ? 140 : 180 }}>
                    {bg(T.finImage) && <div style={{ position: "absolute", inset: 0, overflow: "hidden", borderRadius: 16 }}><div style={{ position: "absolute", inset: -(T.finImageBlur||0)*2, backgroundImage: bg(T.finImage), backgroundSize: T.finImageZoom && T.finImageZoom !== 100 ? `${T.finImageZoom}%` : "cover", backgroundPosition: T.finImagePos || "50% 50%", backgroundRepeat: "no-repeat", opacity: T.finImageOpacity != null ? T.finImageOpacity : 0.45, filter: T.finImageBlur != null ? `blur(${T.finImageBlur}px)` : undefined }} /></div>}
                    {gifUrl && <div style={{ position: "absolute", inset: -Math.max(4, (T.finGifBlur && T.finGifBlur[finKey] != null ? T.finGifBlur[finKey] : 0.5)*2), backgroundImage: `url(${gifUrl})`, backgroundSize: T.finGifZoom && T.finGifZoom[finKey] && T.finGifZoom[finKey] !== 100 ? `${T.finGifZoom[finKey]}%` : "cover", backgroundPosition: T.finGifPos && T.finGifPos[finKey] ? T.finGifPos[finKey] : "center", backgroundRepeat: "no-repeat", filter: `blur(${T.finGifBlur && T.finGifBlur[finKey] != null ? T.finGifBlur[finKey] : 0.5}px)`, opacity: T.finGifOpacity && T.finGifOpacity[finKey] != null ? T.finGifOpacity[finKey] : 0.75 }} />}
                    <div style={{ position: "absolute", inset: 0, background: (T.finGifOverlay && T.finGifOverlay[finKey]) || T.finOverlay || T.resumeOverlay }} />
                    {(() => { const oSt = T.finStyle && T.finStyle[finKey] ? T.finStyle[finKey] : {}; return (
                    <div style={{ position: "relative", zIndex: 1, padding: isMobile ? "8px 16px 16px" : "0px 32px 20px", display: "flex", flexDirection: "column", minHeight: isMobile ? 140 : 180 }}>
                      <div style={{ fontSize: T.finTitleStyle?.size || (isMobile ? 18 : 22), fontWeight: T.finTitleStyle?.bold ? 900 : 700, fontStyle: T.finTitleStyle?.italic ? "italic" : "normal", textDecoration: T.finTitleStyle?.underline ? "underline" : "none", color: T.accent, marginBottom: 8, textAlign: T.finTitleStyle?.align || "center", display: "flex", alignItems: "center", justifyContent: T.finTitleStyle?.align === "left" ? "flex-start" : T.finTitleStyle?.align === "right" ? "flex-end" : "center", gap: 10 }}>{logoOrEmoji(T.finLogo, EMOJI_FIN, isMobile ? 38 : 34, T.finLogoCircle)}{T.finTitle}</div>
                      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: ({"top":"flex-start","center":"center","bottom":"flex-end"})[T.finContentVAlign] || "flex-end", textAlign: oSt.align || "left" }}>
                        <div>
                          <div style={{ fontSize: isMobile ? 20 : 28, marginBottom: 8 }}>{msgData.emoji}</div>
                          <div style={{ fontSize: oSt.size || (isMobile ? 14 : 18), color: "#fff", fontStyle: oSt.italic ? "italic" : "normal", fontWeight: oSt.bold ? 700 : 400, textDecoration: oSt.underline ? "underline" : "none", lineHeight: 1.6, textShadow: "0 1px 4px rgba(0,0,0,0.5)" }}>"{msgData.text}"</div>
                        </div>
                      </div>
                    </div>); })()}
                  </div>);
              })();

              return null; {/* Section inconnue → ignorée */}
            })}
          </div>

          <style>{`
            @keyframes curtainLeft { 0% { transform: translateX(-100%); } 20% { transform: translateX(0%); } 80% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
            @keyframes curtainRight { 0% { transform: translateX(100%); } 20% { transform: translateX(0%); } 80% { transform: translateX(0%); } 100% { transform: translateX(100%); } }
            @keyframes curtainText { 0% { opacity: 0; transform: scale(0.5); } 25% { opacity: 1; transform: scale(1.1); } 70% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); } }
            @keyframes resultReveal { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
            @keyframes voteGlow { 0%, 100% { box-shadow: 0 0 12px 4px rgba(249,115,22,0.35), 0 2px 8px rgba(249,115,22,0.5); } 50% { box-shadow: 0 0 18px 6px rgba(249,115,22,0.5), 0 2px 12px rgba(249,115,22,0.65); } }
            @keyframes tooltipFadeIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
            @keyframes timerFlash { 0% { opacity: 0.3; } 30% { opacity: 0; } 60% { opacity: 0.2; } 100% { opacity: 0; } }
          `}</style>
          {showThemePicker && <div onClick={() => setShowThemePicker(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", backdropFilter: "blur(6px)", padding: 16 }}>
            <div onClick={e => e.stopPropagation()} style={{ background: T.loginCardBg || T.cardBg, borderRadius: 20, padding: isMobile ? "24px 16px" : "32px 28px", maxWidth: 520, width: "100%", cursor: "default", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "90vh", overflowY: "auto" }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: T.textPrimary, marginBottom: 4, textAlign: "center" }}>🎭 Changer le thème</div>
              <div style={{ fontSize: 12, color: T.textSecondary, marginBottom: 20, textAlign: "center" }}>Les feedbacks, votes et actions sont conservés.</div>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 8, marginBottom: 12 }}>
                {getTemplateList().map(t => (
                  <div key={t.id} style={{ position: "relative" }}>
                    <button onClick={() => changeTemplate(t.id)} style={{
                      width: "100%", padding: "12px 14px", borderRadius: 12, cursor: "pointer",
                      border: templateId === t.id ? "2.5px solid " + t.accent : "1.5px solid " + T.cardBorder,
                      background: templateId === t.id ? (t.dark ? t.cardBg : t.accentLight || T.accentLight) : T.cardBg,
                      textAlign: "left", transition: "all 0.2s",
                      transform: templateId === t.id ? "scale(1.02)" : "scale(1)",
                      boxShadow: templateId === t.id ? "0 4px 16px " + t.accent + "44" : "none",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: templateId === t.id ? (t.dark ? t.accent : t.accentDark) : T.textPrimary }}>{t.name}</div>
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          {t._custom && <span style={{ fontSize: 9, background: "#F59E0B22", color: "#F59E0B", padding: "2px 6px", borderRadius: 4, fontWeight: 700 }}>CUSTOM</span>}
                          {templateId === t.id && <span style={{ fontSize: 11, color: t.accent, fontWeight: 700 }}>Actif</span>}
                        </div>
                      </div>
                      <div style={{ fontSize: 11, color: templateId === t.id ? (t.dark ? t.textSecondary : T.textSecondary) : T.textMuted, marginTop: 2 }}>{t.desc}</div>
                      <div style={{ fontSize: 16, marginTop: 4, letterSpacing: 2 }}>{t.preview}</div>
                    </button>
                    {t._custom && isAdmin && <button onClick={(e) => { e.stopPropagation(); if (confirm("Supprimer le thème custom \"" + t.name + "\" ?")) { if (db) db.ref("customTemplates/" + t.id).set(null); if (templateId === t.id) changeTemplate(getTemplateList().find(x => !x._custom)?.id || "backstage"); }}} style={{ position: "absolute", top: 6, right: 6, background: "rgba(239,68,68,0.1)", border: "none", borderRadius: 6, width: 22, height: 22, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#EF4444" }}>✕</button>}
                  </div>
                ))}
              </div>
              {isAdmin && <button onClick={() => { setShowThemePicker(false); window.open("theme-editor.html", "_blank"); }} style={{ width: "100%", padding: "10px 0", borderRadius: 10, border: "1.5px dashed #D97706", background: "none", color: "#D97706", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 12, transition: "all 0.15s" }}
                onMouseEnter={e => { e.currentTarget.style.background = "#FEF3C7"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "none"; }}>
                ✨ Personnaliser un thème
              </button>}
              <button onClick={() => setShowThemePicker(false)} style={{ width: "100%", padding: "12px 0", borderRadius: 10, border: "1.5px solid " + T.cardBorder, background: "none", color: T.textSecondary, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Fermer</button>
            </div>
          </div>}
          {showRetroArchive && <div onClick={() => setShowRetroArchive(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", backdropFilter: "blur(6px)", padding: 16 }}>
            <div onClick={e => e.stopPropagation()} style={{ background: T.loginCardBg || T.cardBg, borderRadius: 20, padding: isMobile ? "24px 16px" : "32px 28px", maxWidth: 560, width: "100%", cursor: "default", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "90vh", overflowY: "auto" }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: T.textPrimary, marginBottom: 4, textAlign: "center" }}>📂 Archives des rétros</div>
              <div style={{ fontSize: 12, color: T.textSecondary, marginBottom: 20, textAlign: "center" }}>Ouvrir une rétro passée en lecture seule</div>
              {archiveLoading && <div style={{ textAlign: "center", padding: "24px 0" }}><div style={{ fontSize: 32, marginBottom: 8, animation: "pulse 1s ease-in-out infinite" }}>🔍</div><div style={{ fontSize: 13, color: T.textMuted }}>Chargement des archives…</div></div>}
              {!archiveLoading && retroArchiveList.length === 0 && <div style={{ textAlign: "center", padding: "24px 0" }}><div style={{ fontSize: 32, marginBottom: 8 }}>📭</div><div style={{ fontSize: 13, color: T.textMuted }}>Aucune rétro archivée trouvée</div></div>}
              {!archiveLoading && retroArchiveList.length > 0 && <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                {retroArchiveList.map(r => (
                  <button key={r.dateKey} onClick={() => openReadOnlyRetro(r.dateKey)} style={{ width: "100%", padding: "14px 16px", borderRadius: 12, cursor: "pointer", border: readOnlyRetroKey === r.dateKey ? "2.5px solid #7C3AED" : "1.5px solid " + (T.cardBorder || "#E8C9A8"), background: readOnlyRetroKey === r.dateKey ? (isDark ? "rgba(124,58,237,0.15)" : "#F5F3FF") : T.cardBg, textAlign: "left", transition: "all 0.2s" }}
                    onMouseEnter={e => { if (readOnlyRetroKey !== r.dateKey) e.currentTarget.style.borderColor = "#A78BFA"; }}
                    onMouseLeave={e => { if (readOnlyRetroKey !== r.dateKey) e.currentTarget.style.borderColor = T.cardBorder || "#E8C9A8"; }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: readOnlyRetroKey === r.dateKey ? "#7C3AED" : T.textPrimary }}>{r.label}</div>
                      {readOnlyRetroKey === r.dateKey && <span style={{ fontSize: 9, background: "#7C3AED22", color: "#7C3AED", padding: "2px 8px", borderRadius: 4, fontWeight: 700 }}>EN COURS</span>}
                    </div>
                    <div style={{ display: "flex", gap: 12, fontSize: 11, color: T.textMuted, marginBottom: 4 }}>
                      <span>💬 {r.fbCount} feedback{r.fbCount > 1 ? "s" : ""}</span>
                      <span>🎯 {r.actCount} action{r.actCount > 1 ? "s" : ""}</span>
                      <span>⭐ {r.ratCount} vote{r.ratCount > 1 ? "s" : ""}</span>
                    </div>
                    {r.participants.length > 0 && <div style={{ fontSize: 10, color: T.textMuted }}>👥 {r.participants.join(", ")}</div>}
                  </button>
                ))}
              </div>}
              {isReadOnly && <button onClick={() => { exitReadOnly(); setShowRetroArchive(false); }} style={{ width: "100%", padding: "10px 0", borderRadius: 10, border: "1.5px solid #7C3AED", background: "none", color: "#7C3AED", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 8 }}>{sprintDateKey ? "↩ Revenir à la rétro en cours" : "↩ Retour à l'accueil"}</button>}
              <button onClick={() => setShowRetroArchive(false)} style={{ width: "100%", padding: "12px 0", borderRadius: 10, border: "1.5px solid " + (T.cardBorder || "#E8C9A8"), background: "none", color: T.textSecondary, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Fermer</button>
            </div>
          </div>}
          {zoomedImage && <div onClick={() => setZoomedImage(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", backdropFilter: "blur(6px)" }}><img src={zoomedImage} style={{ maxWidth: isMobile ? "95vw" : "80vw", maxHeight: "80vh", objectFit: zoomedImage === IMG_LOGO ? "cover" : "contain", borderRadius: zoomedImage === IMG_LOGO ? "50%" : 16, boxShadow: "0 12px 40px rgba(0,0,0,0.5)", ...(zoomedImage === IMG_LOGO ? { width: isMobile ? "70vw" : "60vh", height: isMobile ? "70vw" : "60vh" } : {}) }} /></div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BackstageDebrief />);
  </script>
</body>
</html>
